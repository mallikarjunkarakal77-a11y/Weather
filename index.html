<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Weather App 🌤️</h1>

        <input type="text" id="location" placeholder="Enter city">
        <button onclick="getWeather()">Get Weather</button>

        <div id="result">
            <h2 id="city"></h2>
            <p id="temp"></p>
            <p id="condition"></p>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
